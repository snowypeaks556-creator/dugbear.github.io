<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dugbear Dev</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0d0d0d;
            color: #c8c4bc;
            font-family: 'Inter', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            flex-direction: column;
            padding: 20px;
        }
        h1 {
            font-size: 64px;
            font-weight: 300;
            color: #e8e6e1;
            letter-spacing: 4px;
            font-family: 'Cinzel', 'Times New Roman', serif;
        }
        h1 span {
            color: #c0392b;
        }
        p {
            font-size: 18px;
            color: #7a776f;
            margin-top: 16px;
            letter-spacing: 2px;
            font-weight: 300;
        }
        .bear {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.7;
        }
        .tagline {
            font-size: 13px;
            color: #3d3b36;
            margin-top: 30px;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="bear">🐻</div>
    <h1>Dugbear <span>Dev</span></h1>
    <p>Custom websites · Clean code · Fast delivery</p>
    <div class="tagline">Coming soon</div>
</body>
</html>
